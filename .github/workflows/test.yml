name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: gofmt check
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            gofmt -s -d .
            exit 1
          fi

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run unit tests
        run: go test -v -race -run TestCaddyfile -timeout 30s -coverprofile=coverage.txt -covermode=atomic
      - name: Upload coverage
        if: matrix.go-version == '1.24'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.txt
          fail_ci_if_error: false

  # Integration tests run against real IONOS DNS API.
  # Triggered manually only — never automatic on push/PR.
  # Requires repository secrets: IONOS_DNS_TOKEN, IONOS_TEST_ZONE
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: Run integration tests
        env:
          IONOS_DNS_TOKEN: ${{ secrets.IONOS_DNS_TOKEN }}
          IONOS_TEST_ZONE: ${{ secrets.IONOS_TEST_ZONE }}
        run: go test -v -race -timeout 120s
